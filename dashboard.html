<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ดประชาชน - ระบบลงทะเบียนสุนัขและแมว</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        
        <header class="dash-header">
            <h2 class="title-main" style="font-size: 20px; margin-bottom: 0;">ภาพรวมข้อมูล</h2>
            <button id="logoutBtn" class="btn-primary" style="width: auto; padding: 8px 12px; font-size: 12px; background-color: #ffebee; color: #c62828; border: 1px solid #ffcdd2;">ออกระบบ</button>
        </header>

        <div class="card-neumorphic" style="margin-bottom: 24px; padding: 20px; display: flex; align-items: center; gap: 16px;">
            <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="LINE Profile" style="width: 65px; height: 65px; border-radius: 50%; box-shadow: var(--shadow-extruded); object-fit: cover;">
            <div>
                <h3 style="font-size: 16px; color: var(--primary-color); margin-bottom: 4px;">รอเชื่อมต่อ LINE...</h3>
                <p style="font-size: 12px; color: var(--text-muted); margin: 2px 0;">เลขบัตร: X-XXXX-XXXXX-XX-X</p>
                <p style="font-size: 12px; color: var(--text-muted); margin: 2px 0;">เบอร์โทร: 08X-XXX-XXXX</p>
                <p style="font-size: 12px; color: var(--text-muted); margin: 2px 0; font-weight: 600;">ที่อยู่: บ้านเลขที่ <span id="displayHouseNo">-</span> หมู่ <span id="displayMoo">-</span></p>
            </div>
        </div>

        <div class="card-neumorphic" style="margin-bottom: 24px; padding: 20px;">
            <h3 class="input-label">สัดส่วนวัคซีนในหมู่บ้าน (เป้าหมาย 80%)</h3>
            <div class="progress-track">
                <div class="progress-fill" style="width: 65%;">65%</div>
            </div>
        </div>

        <h3 class="input-label" style="font-size: 16px;">สัตว์เลี้ยงของคุณ</h3>
        <div id="petList">
            <p style="text-align: center; color: var(--text-muted); margin-top: 20px;">กำลังโหลดข้อมูล...</p>
        </div>

        <button class="fab-button" id="addPetBtn">+</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNsfEd11Yv2kNCO_T3s07WJ1eAXUyhssE",
            authDomain: "bangkaew-pet-db.firebaseapp.com",
            projectId: "bangkaew-pet-db",
            storageBucket: "bangkaew-pet-db.firebasestorage.app",
            messagingSenderId: "79581962937",
            appId: "1:79581962937:web:1a50ce4c7fe42340cc7168"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const houseNo = localStorage.getItem("userHouseNo");
        const moo = localStorage.getItem("userMoo");

        document.getElementById("displayHouseNo").innerText = houseNo || "-";
        document.getElementById("displayMoo").innerText = moo || "-";

        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.clear();
            window.location.href = "index.html";
        });
        document.getElementById("addPetBtn").addEventListener("click", () => { window.location.href = "add-pet.html"; });

        function formatThaiDate(dateStr) {
            if (!dateStr) return "ไม่ระบุ";
            let parts = dateStr.split('-');
            if (parts.length === 3) {
                let year = parseInt(parts[0]);
                if (year < 2400) year += 543;
                return `${parts[2]}/${parts[1]}/${year}`;
            }
            return dateStr;
        }

        async function loadPets() {
            const petListDiv = document.getElementById("petList");
            try {
                const q = query(collection(db, "Pets"), 
                    where("houseNumber", "==", houseNo), 
                    where("mooNumber", "==", moo),
                    where("status", "==", "active") 
                );
                const querySnapshot = await getDocs(q);
                petListDiv.innerHTML = ""; 

                if(querySnapshot.empty) {
                    petListDiv.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top: 20px;">ยังไม่มีข้อมูลสัตว์เลี้ยง กดปุ่ม + ด้านล่างเพื่อเพิ่ม</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const pet = doc.data();
                    const petId = doc.id;
                    
                    const animalIcon = pet.petType === 'แมว' ? '🐈' : '🐕';
                    
                    // เพิ่มป้ายประเภทสัตว์เลี้ยงกลับเข้ามา (ป้ายสีเทา)
                    const typeBadge = `<span class="badge-pill badge-gray">${animalIcon} ${pet.petType}</span>`;

                    const genderBadge = pet.petGender === 'ผู้' 
                        ? `<span class="badge-pill" style="background-color: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb;">♂️ เพศผู้</span>` 
                        : `<span class="badge-pill" style="background-color: #fce4ec; color: #c2185b; border: 1px solid #f8bbd0;">♀️ เพศเมีย</span>`;
                    
                    const vaxBadge = pet.isVaccinated 
                        ? `<span class="badge-pill badge-green">💉 เคยฉีด</span>` 
                        : `<span class="badge-pill badge-red">⚠️ ยังไม่ฉีด</span>`;
                    
                    const neuterBadge = pet.isNeutered 
                        ? `<span class="badge-pill badge-green">✂️ ทำหมันแล้ว</span>` 
                        : `<span class="badge-pill badge-yellow">🎀 ยังไม่ทำหมัน</span>`;

                    let displayVacDate = "-";
                    let displayVacPlace = "-";
                    let displayVacLot = "-";
                    let displayVacExp = "-";

                    if(pet.isVaccinated) {
                        displayVacDate = formatThaiDate(pet.vaccineDate);
                        displayVacPlace = pet.vaccinePlace ? pet.vaccinePlace : "ไม่ระบุ";
                        displayVacLot = pet.vaccineLot ? pet.vaccineLot : "ไม่ระบุ";
                        displayVacExp = pet.vaccineExp ? formatThaiDate(pet.vaccineExp) : "ไม่ระบุ";
                    }
                    
                    const cardHTML = `
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <div style="width: 80px; height: 80px; margin: 0 auto 12px; background-color: var(--bg-color); border-radius: 50%; box-shadow: var(--shadow-extruded); display: flex; align-items: center; justify-content: center; font-size: 36px; border: 4px solid white;">
                                    ${animalIcon}
                                </div>
                                
                                <h4 style="color: var(--primary-color); font-size: 22px; margin-bottom: 12px;">${pet.petName}</h4>
                                
                                <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px;">
                                    ${typeBadge}
                                    ${genderBadge}
                                    ${vaxBadge}
                                    ${neuterBadge}
                                </div>
                                
                                <hr style="border: 0; border-top: 1px solid var(--outline-variant); margin-bottom: 16px; width: 100%;">
                                
                                <div style="display: flex; gap: 12px; width: 100%;">
                                    <button class="btn-action-sm btn-orange" onclick="this.closest('.flip-card').classList.toggle('flipped')">📋 ดูใบรับรอง</button>
                                    <button class="btn-action-sm btn-blue" onclick="window.location.href='edit-pet.html?id=${petId}'">✏️ แก้ไข</button>
                                </div>
                            </div>

                            <div class="flip-card-back cert-bg">
                                <h4 style="color: var(--primary-color); border-bottom: 1px dashed var(--primary-color); padding-bottom: 8px; font-size: 18px;">ใบรับรองการฉีดวัคซีน</h4>
                                <p class="text-muted" style="font-size: 14px; margin-top: 12px; text-align: left;"><strong>วันที่ฉีด:</strong> ${displayVacDate}</p>
                                <p class="text-muted" style="font-size: 14px; text-align: left;"><strong>สถานที่ฉีด:</strong> ${displayVacPlace}</p>
                                <p class="text-muted" style="font-size: 14px; text-align: left;"><strong>Lot No:</strong> ${displayVacLot}</p>
                                <p class="text-muted" style="font-size: 14px; text-align: left;"><strong>วันหมดอายุ:</strong> ${displayVacExp}</p>
                                
                                <p class="text-muted" style="font-size: 12px; margin-top: 16px; text-align: left; color: #d9534f;">* กรุณานำสัตว์เลี้ยงมารับวัคซีนกระตุ้นในครั้งต่อไปตามกำหนด</p>
                                <button class="btn-action-sm btn-blue" style="margin-top: auto;" onclick="this.closest('.flip-card').classList.toggle('flipped')">↩️ กลับด้านหน้า</button>
                            </div>
                        </div>
                    </div>`;
                    
                    petListDiv.insertAdjacentHTML('beforeend', cardHTML);
                });
            } catch (error) { 
                console.error(error);
                petListDiv.innerHTML = '<p style="text-align:center; color: red;">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>'; 
            }
        }
        loadPets();
    </script>
</body>
</html>
