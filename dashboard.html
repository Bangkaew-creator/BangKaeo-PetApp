<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ดประชาชน - ระบบลงทะเบียนสุนัขและแมว</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dash-header">
            <div>
                <h2 class="title-main" style="font-size: 18px; text-align: left;">บ้านเลขที่ <span id="displayHouseNo">-</span></h2>
                <p class="subtitle" style="text-align: left; margin-bottom: 0;">หมู่ที่ <span id="displayMoo">-</span></p>
            </div>
            <button id="logoutBtn" class="btn-primary" style="width: auto; padding: 10px 16px; font-size: 14px;">ออกระบบ</button>
        </header>

        <div class="card-neumorphic" style="margin-bottom: 24px; padding: 20px;">
            <h3 class="input-label">สัดส่วนวัคซีนในหมู่บ้าน (เป้าหมาย 80%)</h3>
            <div class="progress-track">
                <div class="progress-fill" style="width: 65%;">65%</div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 12px;">
                <p class="footer-text" style="margin-top: 0;">สุนัข-เมีย ทำหมัน: 45%</p>
                <p class="footer-text" style="margin-top: 0;">แมว-ผู้ ทำหมัน: 30%</p>
            </div>
        </div>

        <h3 class="input-label" style="font-size: 16px;">สัตว์เลี้ยงของคุณ</h3>
        
        <div id="petList">
            <p style="text-align: center; color: var(--text-muted); margin-top: 20px;">กำลังโหลดข้อมูล...</p>
        </div>

        <button class="fab-button" id="addPetBtn">+</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNsfEd11Yv2kNCO_T3s07WJ1eAXUyhssE",
            authDomain: "bangkaew-pet-db.firebaseapp.com",
            projectId: "bangkaew-pet-db",
            storageBucket: "bangkaew-pet-db.firebasestorage.app",
            messagingSenderId: "79581962937",
            appId: "1:79581962937:web:1a50ce4c7fe42340cc7168"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ดึงเลขที่บ้านจากหน่วยความจำ
        const houseNo = localStorage.getItem("userHouseNo");
        const moo = localStorage.getItem("userMoo");

        document.getElementById("displayHouseNo").innerText = houseNo || "-";
        document.getElementById("displayMoo").innerText = moo || "-";

        // 1. ฟังก์ชันล็อกเอาท์
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.clear();
            window.location.href = "index.html";
        });

        // 2. ไปหน้าลงทะเบียนสัตว์เลี้ยง
        document.getElementById("addPetBtn").addEventListener("click", () => {
            window.location.href = "add-pet.html";
        });

        // 3. ฟังก์ชันดึงข้อมูลสัตว์เลี้ยงจาก Firebase
        async function loadPets() {
            const petListDiv = document.getElementById("petList");

            try {
                // ค้นหาสัตว์เลี้ยงที่ตรงกับ "บ้านเลขที่" และ "หมู่" นี้ และสถานะต้องไม่ใช่ตัวที่ตาย/ย้าย (Soft delete)
                const q = query(collection(db, "Pets"), 
                    where("houseNumber", "==", houseNo), 
                    where("mooNumber", "==", moo),
                    where("status", "==", "active")
                );
                
                const querySnapshot = await getDocs(q);
                petListDiv.innerHTML = ""; // ล้างคำว่า "กำลังโหลดข้อมูล..."

                if(querySnapshot.empty) {
                    petListDiv.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top: 20px;">ยังไม่มีข้อมูลสัตว์เลี้ยง กดปุ่ม + ด้านล่างเพื่อเพิ่มข้อมูล</p>';
                    return;
                }

                // วนลูปสร้างการ์ดตามจำนวนสัตว์ที่เจอ
                querySnapshot.forEach((doc) => {
                    const pet = doc.data();
                    
                    // กำหนดไอคอนและป้ายสถานะ
                    const icon = pet.petType === 'แมว' ? '🐱' : '🐶';
                    const statusBadge = pet.isVaccinated 
                        ? '<span style="background: #d4edda; color: #155724; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">วัคซีนแล้ว</span>' 
                        : '<span style="background: #f8d7da; color: #721c24; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">ยังไม่วัคซีน</span>';
                    
                    const neuterText = pet.isNeutered ? "ทำหมันแล้ว" : "ยังไม่ทำหมัน";
                    
                    // โค้ดสร้างหน้าตาการ์ดพลิก 2 ด้าน
                    const cardHTML = `
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front card-neumorphic">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <h4 style="color: var(--primary-color); font-size: 18px;">${icon} ${pet.petName}</h4>
                                    ${statusBadge}
                                </div>
                                <p class="text-muted" style="font-size: 14px; margin-top: 12px; text-align: left;">เพศ: ${pet.petType}-${pet.petGender} | สถานะ: ${neuterText}</p>
                                <button class="btn-primary flip-btn" style="margin-top: 16px; padding: 10px;" onclick="this.closest('.flip-card').classList.toggle('flipped')">พลิกดูใบรับรองวัคซีน 🔄</button>
                            </div>
                            <div class="flip-card-back card-neumorphic cert-bg">
                                <h4 style="color: var(--primary-color); border-bottom: 1px dashed var(--primary-color); padding-bottom: 8px;">ใบรับรองการฉีดวัคซีน</h4>
                                <p class="text-muted" style="font-size: 14px; margin-top: 12px; text-align: left;"><strong>วันที่ฉีด:</strong> ${pet.isVaccinated ? "รอเจ้าหน้าที่ยืนยัน" : "-"}</p>
                                <p class="text-muted" style="font-size: 14px; text-align: left;"><strong>Lot No:</strong> ${pet.isVaccinated ? "รอเจ้าหน้าที่ยืนยัน" : "-"}</p>
                                <p class="text-muted" style="font-size: 12px; margin-top: 12px; text-align: left; color: #d9534f;">* กรุณานำสัตว์เลี้ยงมารับวัคซีนกระตุ้นในครั้งต่อไปตามกำหนด</p>
                                <button class="btn-primary flip-btn" style="margin-top: auto; padding: 10px; background-color: var(--primary-color); color: white;" onclick="this.closest('.flip-card').classList.toggle('flipped')">กลับด้านหน้า ↩️</button>
                            </div>
                        </div>
                    </div>`;
                    
                    // แทรกการ์ดลงไปในหน้าจอ
                    petListDiv.insertAdjacentHTML('beforeend', cardHTML);
                });

            } catch (error) {
                console.error("เกิดข้อผิดพลาด: ", error);
                petListDiv.innerHTML = '<p style="text-align:center; color: red;">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        }

        // 4. สั่งให้ฟังก์ชันทำงานทันทีที่เปิดหน้านี้ขึ้นมา
        loadPets();

    </script>
</body>
</html>
